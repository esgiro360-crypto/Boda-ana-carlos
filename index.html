<style id="custom-styles">
:root { --sage-text: #5B6345; --warm-bg: #F8F5EF; --gold-line: rgba(200, 185, 155, 0.6); --soft-charcoal: #4A4540; --font-header: 'Pinyon Script', cursive; --font-body: 'Libre Baskerville', serif; --font-accent: 'Cinzel', serif; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: var(--warm-bg); color: var(--soft-charcoal); font-family: var(--font-body); font-size: 18px; line-height: 1.8; background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png"); background-attachment: fixed; }
.page-wrapper { max-width: 800px; margin: 0 auto; padding: 60px 24px; display: flex; flex-direction: column; gap: 80px; }
h1 { font-family: var(--font-header); font-size: clamp(64px, 12vw, 110px); color: var(--sage-text); margin-bottom: 24px; }
.hero-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 40px; }
h2 { font-family: var(--font-header); font-size: clamp(40px, 8vw, 64px); color: var(--sage-text); margin-bottom: 16px; }
h3 { font-family: var(--font-accent); font-size: 14px; letter-spacing: 0.20em; text-transform: uppercase; color: var(--sage-text); margin-bottom: 16px; opacity: 0.8; }
.fine-art-img { width: 100%; height: auto; max-height: 550px; object-fit: cover; margin-bottom: 20px; }
.btn-primary { display: inline-block; background: transparent; border: 1px solid var(--gold-line); border-radius: 999px; padding: 12px 30px; font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--soft-charcoal); text-decoration: none; cursor: pointer; transition: all 0.4s ease; margin-top: 20px; }
.form-input { width: 100%; padding: 10px 0; border: none; border-bottom: 1px solid var(--gold-line); background: transparent; font-family: var(--font-body); font-size: 16px; color: var(--soft-charcoal); outline: none; }
#loadingOverlay { position: fixed; inset: 0; background: var(--warm-bg); z-index: 99999; display: flex; justify-content: center; align-items: center; font-family: var(--font-header); font-size: 40px; color: var(--sage-text); transition: opacity 0.8s ease; }
.fade-up { opacity: 0; transform: translateY(20px); transition: opacity 1.5s ease-out, transform 1.5s ease-out; }
.fade-up.is-visible { opacity: 1; transform: translateY(0); }
</style>
</head>

  // Función robusta para ocultar el cargando
  const quitarLoading = () => {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 800); }
  }

  // Cuenta atrás
  function actualizarCuentaAtras() {
      const boda = new Date("June 19, 2027 00:00:00").getTime();
      const ahora = new Date().getTime();
      const diff = boda - ahora;
      if (diff < 0) return;
      const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const el = document.getElementById("cuentaAtras");
      if(el) el.innerHTML = `${dias} días, ${horas} horas y ${minutos} minutos restantes`;
  }
  setInterval(actualizarCuentaAtras, 60000);
  actualizarCuentaAtras();

  window.onload = function() {
    // 1. Iniciamos Firebase solo si hay configuración
    const hayConfig = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";
    
    if (hayConfig && typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // 2. Intentamos cargar datos con timeout de seguridad (3 segundos)
        const loadPromise = db.collection("bodaData").doc("contenidoPrincipal").get();
        const timeoutPromise = new Promise(resolve => setTimeout(resolve, 3000));
        
        Promise.race([loadPromise, timeoutPromise]).then((doc) => {
            if (doc && doc.exists) {
                // ... (aquí iría tu lógica de aplicar datos) ...
            }
            quitarLoading();
        }).catch(() => {
            console.log("Error cargando Firebase, continuando...");
            quitarLoading();
        });
    } else {
        // Si no hay configuración, simplemente ocultamos el loading
        console.log("Firebase no configurado, modo offline.");
        quitarLoading();
    }

    // Efecto fade-up
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add("is-visible"); });
    }, { threshold: 0.1 });
    document.querySelectorAll(".fade-up").forEach(el => observer.observe(el));
  };

  async function enviarConfirmacion() {

  }
</script>
